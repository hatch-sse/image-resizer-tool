<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SSEN Distribution website image resizer</title>

  <!-- Cropper.js CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">

  <style>
    :root {
      --ssen-blue: #003a8f;
      --ssen-blue-dark: #002f73;
      --ssen-ice: #e6eef8;
      --bg: #f4f4f4;
      --border: #d0d0d0;
      --text: #1a1a1a;
      --muted: #666;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 26px;
      color: var(--ssen-blue);
    }

    .subtitle {
      margin-bottom: 18px;
      font-size: 14px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    input[type="file"] {
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
    }

    button {
      padding: 9px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--ssen-ice);
      color: var(--ssen-blue);
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #d9e6f5;
    }

    button.primary {
      background: var(--ssen-blue);
      border-color: var(--ssen-blue);
      color: #fff;
    }

    button.primary:hover {
      background: var(--ssen-blue-dark);
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
    }

    .image-container {
      width: 100%;
      height: 620px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      overflow: hidden;
    }

    #image {
      max-width: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>SSEN Distribution website image resizer</h1>
    <div class="subtitle">
      Upload an image, choose a preset, adjust the crop, then download.
    </div>

    <div class="controls">
      <div class="row">
        <input type="file" id="fileInput" accept="image/*">
        <span class="hint" id="fileNameHint">Choose an image to begin.</span>
      </div>

      <div class="row">
        <strong>Presets:</strong>
        <button onclick="setPreset(400, 250)">Website article (400 × 250)</button>
        <button onclick="setPreset(1630, 580)">Website header (1630 × 580)</button>
        <button class="primary" onclick="downloadImage()">Download image</button>
      </div>

      <div class="hint">
        Tip: drag the image to reposition it within the crop area.
      </div>
    </div>

    <div class="image-container">
      <img id="image" alt="Image to crop">
    </div>
  </div>

  <!-- Cropper.js JS -->
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>

  <script>
    const image = document.getElementById("image");
    const fileInput = document.getElementById("fileInput");
    const fileNameHint = document.getElementById("fileNameHint");

    let cropper = null;
    let targetWidth = 400;
    let targetHeight = 250;
    let originalFileName = "image";
