<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SSEN Distribution website image resizer</title>

  <!-- ✅ Cropper.js CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"
  />

  <style>
    :root {
      --ssen-blue: #003a8f;
      --ssen-light-blue: #e6eef8;
      --ssen-grey: #f4f4f4;
      --ssen-border: #d0d0d0;
      --text-main: #1a1a1a;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: var(--ssen-grey);
      color: var(--text-main);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid var(--ssen-border);
      border-radius: 6px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 26px;
      color: var(--ssen-blue);
    }

    .subtitle {
      margin-bottom: 20px;
      color: #555;
      font-size: 14px;
    }

    .controls {
      margin-bottom: 20px;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    input[type="file"] {
      padding: 6px;
      border: 1px solid var(--ssen-border);
      border-radius: 4px;
      background: #fff;
    }

    .preset-label {
      font-weight: 600;
    }

    button {
      padding: 8px 14px;
      border-radius: 4px;
      border: 1px solid var(--ssen-border);
      background: var(--ssen-light-blue);
      color: var(--ssen-blue);
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #d9e6f5;
    }

    .primary {
      background: var(--ssen-blue);
      color: #fff;
      border-color: var(--ssen-blue);
    }

    .primary:hover {
      background: #002f73;
    }

    .hint {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }

    .image-container {
      width: 100%;
      height: 600px;
      background: #fafafa;
      border: 1px solid var(--ssen-border);
      border-radius: 4px;
      padding: 10px;
      overflow: hidden;
    }

    img {
      max-width: 100%;
      max-height: 100%;
      display: block;
    }
  </style>
</head>

<body>

  <div class="app">

    <h1>SSEN Distribution website image resizer</h1>
    <div class="subtitle">
      Upload an image, choose the correct preset, and adjust the crop before downloading.
    </div>

    <div class="controls">

      <div class="controls-row">
        <input type="file" id="fileInput" accept="image/*">
      </div>

      <div class="controls-row">
        <span class="preset-label">Presets:</span>

        <button onclick="setPreset(400, 250)">
          Website article (400 × 250)
        </button>

        <button onclick="setPreset(1630, 580)">
          Website header (1630 × 580)
        </button>

        <button class="primary" onclick="downloadImage()">
          Download image
        </button>
      </div>

      <div class="hint">
        Tip: drag the image to reposition it within the crop area.
      </div>

    </div>

    <div class="image-container">
      <img id="image">
    </div>

  </div>

  <!-- ✅ Cropper.js JS -->
  <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>

  <script>
    const image = document.getElementById("image");
    const fileInput = document.getElementById("fileInput");

    let cropper = null;

    // Default preset: Website article (400 × 250)
    let targetWidth = 400;
    let targetHeight = 250;

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        image.src = reader.result;
        image.style.display = "block"; // ✅ ENSURE IMAGE IS VISIBLE

        image.onload = () => {
          if (cropper) {
            cropper.destroy();
          }

          cropper = new Cropper(image, {
            aspectRatio: targetWidth / targetHeight,
            viewMode: 0,
            autoCropArea: 0.8,
            background: true,
            movable: true,
            zoomable: true,
            responsive: true,
            ready() {
              this.cropper.zoomTo(0); // ✅ show full image
            }
          });
        };
      };

      reader.readAsDataURL(file);
    });

    function setPreset(width, height) {
      targetWidth = width;
      targetHeight = height;

      if (cropper) {
        cropper.setAspectRatio(width / height);
        cropper.zoomTo(0);
      }
    }

    function downloadImage() {
      if (!cropper) {
        alert("Please choose an image first.");
        return;
      }

      const canvas = cropper.getCroppedCanvas({
        width: targetWidth,
        height: targetHeight
      });

      const link = document.createElement("a");
      link.download = `image-${targetWidth}x${targetHeight}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
``
