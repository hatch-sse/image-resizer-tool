<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Crop Test</title>

  <!-- Cropper CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css"
  >

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    #image {
      max-width: 100%;
      display: none;
      border: 1px solid #ccc;
    }

    #status {
      margin: 10px 0;
      font-weight: bold;
      color: green;
    }
  </style>
</head>

<body>

  <h2>Image Cropper (Debug Version)</h2>

  <div id="status">Page loaded ✅</div>

  <input type="file" id="fileInput" accept="image/*">
  <br><br>

  <button id="preset1">250 × 400</button>
  <button id="preset2">580 × 1630</button>
  <button id="download">Download</button>

  <br><br>

  <img id="image">

  <!-- Cropper JS -->
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const status = document.getElementById("status");
      const fileInput = document.getElementById("fileInput");
      const image = document.getElementById("image");
      const preset1 = document.getElementById("preset1");
      const preset2 = document.getElementById("preset2");
      const downloadBtn = document.getElementById("download");

      let cropper = null;
      let width = 250;
      let height = 400;

      status.textContent = "JavaScript running ✅";

      fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = () => {
          image.src = reader.result;
          image.style.display = "block";

          image.onload = () => {
            if (cropper) cropper.destroy();

            cropper = new Cropper(image, {
              aspectRatio: width / height,
              viewMode: 1,
              autoCropArea: 1
            });

            status.textContent = "Cropper loaded ✅";
          };
        };

        reader.readAsDataURL(file);
      });

      preset1.onclick = () => {
        width = 250;
        height = 400;
        if (cropper) cropper.setAspectRatio(width / height);
      };

      preset2.onclick = () => {
        width = 580;
        height = 1630;
        if (cropper) cropper.setAspectRatio(width / height);
      };

      downloadBtn.onclick = () => {
        if (!cropper) {
          alert("Choose an image first");
          return;
        }

        const canvas = cropper.getCroppedCanvas({ width, height });
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = `${width}x${height}.png`;
        link.click();
      };
    });
  </script>

</body>
</html>
``
