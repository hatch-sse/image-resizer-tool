<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Resizer & Crop Tool</title>

  <!-- Cropper.js CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"
  />

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f7;
    }

    h2 {
      margin-top: 0;
    }

    .controls {
      margin-bottom: 16px;
    }

    button {
      margin-right: 8px;
      padding: 6px 12px;
      cursor: pointer;
    }

    .image-container {
      max-width: 100%;
      background: #eee;
      padding: 10px;
      border: 1px solid #ccc;
    }

    img {
      max-width: 100%;
      display: none;
    }
  </style>
</head>

<body>

  <h2>Image Resizer & Crop Tool</h2>

  <div class="controls">
    <input type="file" id="fileInput" accept="image/*">
    <br><br>

    <strong>Presets:</strong>
    <button onclick="setPreset(400, 250)">
      Website article (400 × 250)
    </button>
    <button onclick="setPreset(1630, 580)">
      Website header (1630 × 580)
    </button>

    <br><br>

    <button onclick="downloadImage()">Download image</button>
  </div>

  <div class="image-container">
    <img id="image">
  </div>

  <!-- Cropper.js JS -->
  <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>

  <script>
    const image = document.getElementById("image");
    const fileInput = document.getElementById("fileInput");

    let cropper = null;

    // Default preset = Website article (400 x 250)
    let targetWidth = 400;
    let targetHeight = 250;

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        image.style.display = "block";
        image.src = reader.result;

        image.onload = () => {
          if (cropper) cropper.destroy();

          cropper = new Cropper(image, {
            aspectRatio: targetWidth / targetHeight,
            viewMode: 1,
            autoCropArea: 1,
            responsive: true
          });
        };
      };

      reader.readAsDataURL(file);
    });

    function setPreset(width, height) {
      targetWidth = width;
      targetHeight = height;

      if (cropper) {
        cropper.setAspectRatio(width / height);
      }
    }

    function downloadImage() {
      if (!cropper) {
        alert("Please choose an image first.");
        return;
      }

      const canvas = cropper.getCroppedCanvas({
        width: targetWidth,
        height: targetHeight
      });

      const link = document.createElement("a");
      link.download = `image-${targetWidth}x${targetHeight}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>

</body>
</html>
``
