<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SSEN Distribution website image resizer</title>

  <!-- Cropper.js CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css"
  />

  <style>
    :root {
      --ssen-blue: #003a8f;
      --ssen-blue-dark: #002f73;
      --ssen-ice: #e6eef8;
      --bg: #f4f4f4;
      --border: #d0d0d0;
      --text: #1a1a1a;
      --muted: #666;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 26px;
      color: var(--ssen-blue);
    }

    .subtitle {
      margin-bottom: 18px;
      font-size: 14px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .label {
      font-weight: 600;
    }

    input[type="file"] {
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
    }

    input[type="number"] {
      width: 110px;
      padding: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    button {
      padding: 9px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--ssen-ice);
      color: var(--ssen-blue);
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #d9e6f5;
    }

    button.primary {
      background: var(--ssen-blue);
      border-color: var(--ssen-blue);
      color: #fff;
    }

    button.primary:hover {
      background: var(--ssen-blue-dark);
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
    }

    .image-container {
      width: 100%;
      height: 620px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      overflow: hidden;
    }

    #image {
      display: block;
      max-width: 100%;
    }
  </style>
</head>

<body>
  <div class="app">
    <h1>SSEN Distribution website image resizer</h1>
    <div class="subtitle">
      Upload an image, choose a preset or enter a custom size, adjust the crop, then download.
    </div>

    <div class="controls">
      <div class="row">
        <input type="file" id="fileInput" accept="image/*" />
        <span class="hint" id="fileNameHint">Choose an image to begin.</span>
      </div>

      <div class="row">
        <span class="label">Presets:</span>
        <button onclick="setPreset(400, 250)">Website article (400 × 250)</button>
        <button onclick="setPreset(1630, 580)">Website header (1630 × 580)</button>
      </div>

      <!-- ✅ NEW: Custom dimensions -->
      <div class="row">
        <span class="label">Custom size:</span>
        <input type="number" id="customWidth" placeholder="Width (px)" min="1" />
        <input type="number" id="customHeight" placeholder="Height (px)" min="1" />
        <button onclick="applyCustomSize()">Apply</button>
      </div>

      <div class="row">
        <button class="primary" onclick="downloadImage()">Download image</button>
      </div>

      <div class="hint">
        Tip: drag the image to reposition it within the crop area.
      </div>
    </div>

    <div class="image-container">
      <img id="image" alt="Image to crop" />
    </div>
  </div>

  <!-- Cropper.js JS -->
  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>

  <script>
    const image = document.getElementById("image");
    const fileInput = document.getElementById("fileInput");
    const fileNameHint = document.getElementById("fileNameHint");
    const customWidthInput = document.getElementById("customWidth");
    const customHeightInput = document.getElementById("customHeight");

    let cropper = null;
    let targetWidth = 400;
    let targetHeight = 250;
    let originalFileName = "image";

    fileInput.addEventListener("change", () => {
      const file = fileInput.files[0];
      if (!file) return;

      originalFileName = file.name.replace(/\.[^/.]+$/, "");
      fileNameHint.textContent = file.name;

      const reader = new FileReader();
      reader.onload = () => {
        image.src = reader.result;
      };
      reader.readAsDataURL(file);
    });

    image.addEventListener("load", () => {
      if (cropper) cropper.destroy();

      cropper = new Cropper(image, {
        aspectRatio: targetWidth / targetHeight,
        viewMode: 0,
        autoCropArea: 0.85,
        dragMode: "move",
        background: true,
        movable: true,
        zoomable: true,
        responsive: true
      });
    });

    function setPreset(width, height) {
