<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Resizer</title>

  <!-- Cropper.js CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/cropperjs/dist/cropper.css"
  >

  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f7;
    }

    h2 {
      margin-top: 0;
    }

    .controls {
      margin-bottom: 12px;
    }

    button {
      margin-right: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    .image-container {
      max-width: 100%;
      background: #ddd;
      margin-bottom: 12px;
    }

    img {
      max-width: 100%;
      display: block;
    }
  </style>
</head>

<body>
  <h2>Image Resizer & Crop Tool</h2>

  <div class="controls">
    <input type="file" id="fileInput" accept="image/*">
    <br><br>

    <strong>Presets:</strong>
    <button onclick="setPreset(250, 400)">
      Website article (250 × 400)
    </button>
    <button onclick="setPreset(580, 1630)">
      Website header (580 × 1630)
    </button>

    <br><br>
    <button onclick="downloadImage()">Download image</button>
  </div>

  <div class="image-container">
    <img id="image">
  </div>

  <!-- Cropper.js -->
  <script src="https://unpkg.com/cropperjs/dist/cropper.js"></script>

  <script>
    const image = document.getElementById("image");
    const fileInput = document.getElementById("fileInput");
    let cropper;
    let targetWidth = 250;
    let targetHeight = 400;

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        image.src = reader.result;

        if (cropper) cropper.destroy();

        cropper = new Cropper(image, {
          aspectRatio: targetWidth / targetHeight,
          viewMode: 1,
          autoCropArea: 1
        });
      };
      reader.readAsDataURL(file);
    });

    function setPreset(width, height) {
      targetWidth = width;
      targetHeight = height;
      if (cropper) cropper.setAspectRatio(width / height);
    }

    function downloadImage() {
      if (!cropper) return;

      const canvas = cropper.getCroppedCanvas({
        width: targetWidth,
        height: targetHeight
      });

      const link = document.createElement("a");
      link.download = `image-${targetWidth}x${targetHeight}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }
  </script>
</body>
</html>
